<mat-card>
    <h1 class="mat-title">{{ date | date }}</h1>
    <mat-card-content class="flex">
        <table mat-table [dataSource]="dataSource" class="flex-grow-1 flex-shrink-1 flex-basis-0">
            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef>Title</th>
                <td mat-cell *matCellDef="let element">{{ element.title }}</td>
            </ng-container>
            <ng-container matColumnDef="startDate">
                <th mat-header-cell *matHeaderCellDef>Start</th>
                <td mat-cell *matCellDef="let element">
                    {{ element.startDate | date: "HH:mm" }}
                </td>
            </ng-container>
            <ng-container matColumnDef="endDate">
                <th mat-header-cell *matHeaderCellDef>End</th>
                <td mat-cell *matCellDef="let element">{{ element.endDate | date }}</td>
            </ng-container>
            <ng-container matColumnDef="state">
                <th mat-header-cell *matHeaderCellDef>State</th>
                <td mat-cell *matCellDef="let element">
                    <yata-task-state-icon *ngIf="isSelectingStateForId != element.id" [state]="element.state" (click)="setIsSelectingState(element.id)"></yata-task-state-icon>
                    <div *ngIf="isSelectingStateForId == element.id">
                        <yata-task-state-icon *ngFor="let state of states" [state]="state" (click)="changeState(state, element)"></yata-task-state-icon>
                    </div>
                </td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element">
                    <ng-container [ngTemplateOutlet]="actions"></ng-container>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
    </mat-card-content>
    <mat-card-actions>
        <button mat-button>TEST 1</button>
        <button mat-button>TEST 2</button>
    </mat-card-actions>
</mat-card>

<ng-template #actions>
    <button mat-icon-button [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
        <button mat-menu-item>
            <mat-icon>dialpad</mat-icon>
            <span>TODO</span>
        </button>
        <button mat-menu-item disabled>
            <mat-icon>voicemail</mat-icon>
            <span>TODO</span>
        </button>
        <button mat-menu-item>
            <mat-icon>notifications_off</mat-icon>
            <span>TODO</span>
        </button>
    </mat-menu>
</ng-template>
